openapi: 3.0.3
info:
  title: 小学数学结构化知识库 API
  version: 1.1.0
  description: 面向前端联调的标准化接口契约（v1）。
servers:
  - url: http://127.0.0.1:18080
    description: 本地联调环境
security:
  - ApiKeyAuth: []
tags:
  - name: Health
  - name: Catalog
  - name: Topics
  - name: Problems
  - name: Search
  - name: Quality
paths:
  /health:
    get:
      tags: [Health]
      summary: 服务健康检查
      security: []
      responses:
        '200':
          description: 成功
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/XTraceId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /catalog/chapters:
    get:
      tags: [Catalog]
      summary: 章节目录列表
      parameters:
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit100'
      responses:
        '200':
          description: 成功
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/XTraceId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChapterListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /topics:
    get:
      tags: [Topics]
      summary: 主题列表
      parameters:
        - $ref: '#/components/parameters/Audience'
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/ChapterId'
        - $ref: '#/components/parameters/Domain'
        - $ref: '#/components/parameters/GradeBand'
        - $ref: '#/components/parameters/Difficulty'
        - $ref: '#/components/parameters/HasPrerequisites'
        - $ref: '#/components/parameters/HasLearningObjectives'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 成功
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/XTraceId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /topics/{topic_id}:
    get:
      tags: [Topics]
      summary: 主题详情
      parameters:
        - $ref: '#/components/parameters/Audience'
        - name: topic_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/XTraceId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /problems:
    get:
      tags: [Problems]
      summary: 题目列表
      parameters:
        - $ref: '#/components/parameters/Audience'
        - $ref: '#/components/parameters/TopicId'
        - $ref: '#/components/parameters/ChapterId'
        - $ref: '#/components/parameters/GradeBand'
        - $ref: '#/components/parameters/Difficulty'
        - $ref: '#/components/parameters/MethodTag'
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/Order'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 成功
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/XTraceId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /problems/{problem_id}:
    get:
      tags: [Problems]
      summary: 题目详情
      parameters:
        - $ref: '#/components/parameters/Audience'
        - name: problem_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/XTraceId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /search:
    get:
      tags: [Search]
      summary: 统一检索（Query）
      parameters:
        - $ref: '#/components/parameters/Audience'
        - $ref: '#/components/parameters/QRequired'
        - $ref: '#/components/parameters/ChapterId'
        - $ref: '#/components/parameters/GradeBand'
        - $ref: '#/components/parameters/Difficulty'
        - $ref: '#/components/parameters/MethodTag'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 成功
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/XTraceId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Search]
      summary: 统一检索（JSON Body）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: 成功
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/XTraceId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /quality/summary:
    get:
      tags: [Quality]
      summary: 质量摘要
      responses:
        '200':
          description: 成功
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/XTraceId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualitySummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /quality/validation:
    get:
      tags: [Quality]
      summary: 质量校验详情
      responses:
        '200':
          description: 成功
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/XTraceId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityValidationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /quality/gate/report:
    get:
      tags: [Quality]
      summary: 最近一次门禁报告
      responses:
        '200':
          description: 成功
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/XTraceId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityGateReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /quality/gate/evaluate:
    get:
      tags: [Quality]
      summary: 动态门禁评估（Query）
      parameters:
        - name: gate_profile
          in: query
          required: false
          schema:
            type: string
        - name: knowledge_version
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 成功
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/XTraceId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityGateEvaluateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Quality]
      summary: 动态门禁评估（JSON Body）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QualityGateEvaluateRequest'
      responses:
        '200':
          description: 成功
          headers:
            X-Trace-Id:
              $ref: '#/components/headers/XTraceId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityGateEvaluateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  headers:
    XTraceId:
      description: 请求追踪 ID
      schema:
        type: string
  parameters:
    Audience:
      name: audience
      in: query
      required: false
      schema:
        type: string
        enum: [teacher, student]
        default: teacher
    Q:
      name: q
      in: query
      required: false
      schema:
        type: string
    QRequired:
      name: q
      in: query
      required: true
      schema:
        type: string
    TopicId:
      name: topic_id
      in: query
      required: false
      schema:
        type: string
    ChapterId:
      name: chapter_id
      in: query
      required: false
      schema:
        type: string
    Domain:
      name: domain
      in: query
      required: false
      schema:
        type: string
    GradeBand:
      name: grade_band
      in: query
      required: false
      schema:
        type: string
    Difficulty:
      name: difficulty
      in: query
      required: false
      schema:
        type: string
    MethodTag:
      name: method_tag
      in: query
      required: false
      schema:
        type: string
    HasPrerequisites:
      name: has_prerequisites
      in: query
      required: false
      schema:
        type: boolean
    HasLearningObjectives:
      name: has_learning_objectives
      in: query
      required: false
      schema:
        type: boolean
    OrderBy:
      name: order_by
      in: query
      required: false
      schema:
        type: string
        default: topic_id
    Order:
      name: order
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: asc
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 20
    Limit100:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
  responses:
    BadRequest:
      description: 参数错误
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/XTraceId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 鉴权失败
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/XTraceId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 资源不存在
      headers:
        X-Trace-Id:
          $ref: '#/components/headers/XTraceId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Meta:
      type: object
      additionalProperties: true
    Topic:
      type: object
      additionalProperties: true
    Problem:
      type: object
      additionalProperties: true
    Chapter:
      type: object
      additionalProperties: true
    HealthResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          type: object
          properties:
            status:
              type: string
              example: up
        trace_id:
          type: string
    ChapterListResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Chapter'
        meta:
          $ref: '#/components/schemas/Meta'
        trace_id:
          type: string
    TopicListResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Topic'
        meta:
          $ref: '#/components/schemas/Meta'
        trace_id:
          type: string
    TopicDetailResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/Topic'
        trace_id:
          type: string
    ProblemListResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Problem'
        meta:
          $ref: '#/components/schemas/Meta'
        trace_id:
          type: string
    ProblemDetailResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/Problem'
        trace_id:
          type: string
    SearchRequest:
      type: object
      required: [q]
      properties:
        audience:
          type: string
          enum: [teacher, student]
          default: teacher
        q:
          type: string
        chapter_id:
          type: string
        grade_band:
          type: string
        difficulty:
          type: string
        method_tag:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 500
          default: 10
    SearchResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          additionalProperties: true
        meta:
          $ref: '#/components/schemas/Meta'
        trace_id:
          type: string
    QualitySummaryResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          additionalProperties: true
        trace_id:
          type: string
    QualityValidationResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          additionalProperties: true
        trace_id:
          type: string
    QualityGateReportResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          additionalProperties: true
        trace_id:
          type: string
    QualityGateEvaluateRequest:
      type: object
      properties:
        gate_profile:
          type: string
        knowledge_version:
          type: string
    QualityGateEvaluateResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          additionalProperties: true
        trace_id:
          type: string
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 401
        message:
          type: string
          example: missing or invalid api key
        data:
          nullable: true
        trace_id:
          type: string
